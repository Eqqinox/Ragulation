name: Eval

# Runs a small, fast RAGAS faithfulness regression gate on every push
# and PR, against a tiny fixed corpus subset (gdpr_en only) and 3 fixed
# questions. Kept as its own workflow, separate from ci.yml's fast
# lint/type/unit-test job, since this involves real LLM calls and is
# slower and less deterministic.
#
# Generation and the judge run on Ollama Cloud (https://ollama.com),
# using gemma4; embeddings (bge-m3) still run on a locally installed
# Ollama, since Ollama Cloud's catalog is large frontier models only
# (glm/qwen/gemma/minimax/kimi/deepseek/nemotron/gpt-oss-scale, no
# embedding models at all -- confirmed against ollama.com/search?c=cloud
# directly, not assumed).
#
# This is the fourth CI judge design, not the first attempt: a small
# local model (mistral-small3.2 does not fit a GitHub-hosted runner's
# ~14 GB disk budget) was tried first, then several other small local
# models (qwen2.5:1.5b, qwen2.5:3b, ministral-3:3b), all of which
# failed RAGAS's ContextRecall structured output specifically on this
# runner's CPU-only Ollama build -- every time, even after each was
# separately verified reliable on this project's local GPU-accelerated
# Ollama first. Ollama Cloud runs generation/judging on real inference
# hardware, removing that backend-dependent gap at its root instead of
# continuing to search for a small local model immune to it. gemma4
# was rejected earlier in this same search purely for its 9.6 GB local
# disk footprint (matryoshka architecture, larger on disk than its "4B
# effective" name suggests) -- that constraint does not apply when it
# is called as a hosted API instead of pulled locally, so it is back in
# consideration here, now actually tested for structured-output
# reliability rather than ruled out on size alone. See ADR-0006's
# addenda for the full history.
#
# Requires an OLLAMA_API_KEY repository secret (an Ollama Cloud API
# key, generated at ollama.com/settings/keys). See
# scripts/run_ci_eval_gate.py for the full design.

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  faithfulness-gate:
    runs-on: ubuntu-latest
    services:
      qdrant:
        image: qdrant/qdrant:v1.18.2
        ports:
          - 6333:6333
          - 6334:6334

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: true
          python-version: "3.11"

      - name: Install dependencies
        run: uv sync --locked

      - name: Install Ollama
        run: curl -fsSL https://ollama.com/install.sh | sh

      - name: Start Ollama
        # Serves bge-m3 embeddings only in this job -- generation and
        # the judge run on Ollama Cloud instead (see the workflow's
        # header comment).
        run: |
          OLLAMA_CONTEXT_LENGTH=16384 nohup ollama serve > /tmp/ollama.log 2>&1 &
          for i in $(seq 1 30); do
            curl -fs http://localhost:11434 > /dev/null && exit 0
            sleep 2
          done
          echo "Ollama did not become ready in time"
          cat /tmp/ollama.log
          exit 1

      - name: Pull the embedding model
        run: ollama pull bge-m3

      - name: Run the faithfulness gate
        env:
          OLLAMA_GENERATION_BASE_URL: "https://ollama.com"
          OLLAMA_GENERATION_API_KEY: ${{ secrets.OLLAMA_API_KEY }}
          OLLAMA_GENERATION_MODEL_NAME: "gemma4"
          OLLAMA_JUDGE_BASE_URL: "https://ollama.com"
          OLLAMA_JUDGE_API_KEY: ${{ secrets.OLLAMA_API_KEY }}
          OLLAMA_JUDGE_MODEL_NAME: "gemma4"
        run: uv run python scripts/run_ci_eval_gate.py
