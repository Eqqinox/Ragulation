name: Eval

# Runs a small, fast RAGAS faithfulness regression gate on every push
# and PR, against a tiny fixed corpus subset (gdpr_en only) and 3 fixed
# questions, using a small CI-sized judge model. Kept as its own
# workflow, separate from ci.yml's fast lint/type/unit-test job, since
# this involves real LLM calls and is slower and less deterministic.
# See ADR-0006 and scripts/run_ci_eval_gate.py for the full design and
# why the CI judge model differs from the local/headline judge
# (mistral-small3.2 does not fit a GitHub-hosted runner's disk budget).

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  faithfulness-gate:
    runs-on: ubuntu-latest
    services:
      qdrant:
        image: qdrant/qdrant:v1.18.2
        ports:
          - 6333:6333
          - 6334:6334

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: true
          python-version: "3.11"

      - name: Install dependencies
        run: uv sync --locked

      - name: Install Ollama
        run: curl -fsSL https://ollama.com/install.sh | sh

      - name: Start Ollama
        run: |
          OLLAMA_CONTEXT_LENGTH=16384 nohup ollama serve > /tmp/ollama.log 2>&1 &
          for i in $(seq 1 30); do
            curl -fs http://localhost:11434 > /dev/null && exit 0
            sleep 2
          done
          echo "Ollama did not become ready in time"
          cat /tmp/ollama.log
          exit 1

      - name: Pull models
        # ministral-3:3b (Mistral AI, Apache-2.0, ~3.0 GB) serves both
        # the generation and judge roles in CI (mistral-small3.2, used
        # for both roles locally, is 15 GB and does not fit a
        # GitHub-hosted runner's ~14 GB disk budget). Four other
        # candidates were tried and rejected with evidence, not by
        # guessing: qwen2.5:1.5b consistently failed RAGAS's
        # ContextRecall structured output on this runner's CPU-only
        # Ollama build (worked reliably in local GPU testing -- a real
        # backend-dependent reliability gap, not flakiness); qwen2.5:3b
        # fixed that but showed one anomalous answer_relevancy=0.0 on a
        # clearly correct answer during further testing; qwen3.5:4b's
        # "thinking mode" never completed a single one of 12 test calls
        # after 24+ minutes, unusably slow for CI regardless of eventual
        # correctness; gemma4:E4B was ruled out on disk size alone
        # (9.6 GB despite "4B effective" naming). ministral-3:3b scored
        # a clean 12/12 on the exact 3 gate questions across all four
        # metrics, ~12s/call, no anomalies, before switching. See
        # ADR-0006's addendum.
        run: |
          ollama pull ministral-3:3b
          ollama pull bge-m3

      - name: Run the faithfulness gate
        env:
          OLLAMA_GENERATION_MODEL_NAME: "ministral-3:3b"
          OLLAMA_JUDGE_MODEL_NAME: "ministral-3:3b"
        run: uv run python scripts/run_ci_eval_gate.py
