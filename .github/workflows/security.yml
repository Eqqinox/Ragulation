name: Security

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    # Weekly, to catch advisories newly disclosed against already-pinned
    # dependencies, not just at merge time.
    - cron: "0 6 * * 1"

permissions:
  contents: read

jobs:
  pip-audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --locked

      - name: pip-audit
        # PYSEC-2026-2447 (diskcache) and PYSEC-2026-3046 (ragas) are
        # reviewed, accepted findings with no fixed version available on
        # PyPI; see ADR-0006 for why each is unreachable by this
        # project's own code. Any other finding still fails the build.
        run: uv run pip-audit --ignore-vuln PYSEC-2026-2447 --ignore-vuln PYSEC-2026-3046

  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Gitleaks
        uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
